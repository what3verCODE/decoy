name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain (proto reads .prototools)
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # Discover example workspaces so each gets its own e2e job (the e2e tier lives in
  # examples/*, exposed as `test:e2e`). Browser examples (those depending on
  # @playwright/test) are split out so they can install Chromium in a dedicated job;
  # the rest run a plain job. Each list is empty when no such example exists, so the
  # corresponding job simply skips rather than failing.
  discover-examples:
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.find.outputs.examples }}
      has-examples: ${{ steps.find.outputs.has-examples }}
      browser-examples: ${{ steps.find.outputs.browser-examples }}
      has-browser-examples: ${{ steps.find.outputs.has-browser-examples }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          shopt -s nullglob
          plain=()
          browser=()
          for dir in examples/*/; do
            pkg="${dir}package.json"
            [ -f "$pkg" ] || continue
            name="$(basename "$dir")"
            # @playwright/test ⇒ real Chromium ⇒ the dedicated browser job.
            if jq -e '(.devDependencies["@playwright/test"] // .dependencies["@playwright/test"]) != null' "$pkg" >/dev/null; then
              browser+=("$name")
            else
              plain+=("$name")
            fi
          done
          emit() {
            local key="$1"; shift
            if [ "$#" -eq 0 ]; then
              echo "has-$key=false" >> "$GITHUB_OUTPUT"
              echo "$key=[]" >> "$GITHUB_OUTPUT"
            else
              echo "has-$key=true" >> "$GITHUB_OUTPUT"
              echo "$key=$(printf '%s\n' "$@" | jq -R . | jq -cs .)" >> "$GITHUB_OUTPUT"
            fi
          }
          emit examples "${plain[@]}"
          emit browser-examples "${browser[@]}"

  # One job per non-browser example, running just that example's `test:e2e`.
  example-e2e:
    needs: discover-examples
    if: needs.discover-examples.outputs.has-examples == 'true'
    runs-on: ubuntu-latest
    name: e2e (${{ matrix.example }})
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJSON(needs.discover-examples.outputs.examples) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain (proto reads .prototools)
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Examples are real consumers: they boot Decoy through a config loaded at
      # runtime, which resolves `@decoy/*` to built `./dist` (the `default` export
      # condition). So e2e runs against built packages — internal package tests are
      # the build-free tier (they activate the `source` condition; see CONTRIBUTING).
      - name: Build @decoy packages
        run: pnpm build

      - name: e2e
        run: pnpm --filter "./examples/${{ matrix.example }}" run test:e2e

  # One job per browser example. The root install scripts skip Playwright's browser
  # download (pnpm-workspace.yaml), so we install Chromium + its system deps here —
  # never in the default `pnpm test`.
  example-e2e-browser:
    needs: discover-examples
    if: needs.discover-examples.outputs.has-browser-examples == 'true'
    runs-on: ubuntu-latest
    name: e2e-browser (${{ matrix.example }})
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJSON(needs.discover-examples.outputs.browser-examples) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain (proto reads .prototools)
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Examples run against built packages (same as the non-browser e2e job): they
      # boot Decoy through a runtime-loaded config that resolves `@decoy/*` to `./dist`.
      - name: Build @decoy packages
        run: pnpm build

      - name: Install Chromium (+ system deps)
        run: pnpm --filter "./examples/${{ matrix.example }}" exec playwright install --with-deps chromium

      - name: e2e
        run: pnpm --filter "./examples/${{ matrix.example }}" run test:e2e
