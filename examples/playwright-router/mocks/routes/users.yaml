# GET /api/users/42 — the single endpoint the SPA calls. The `/api/` prefix is what
# the router intercepts (see tests/fixtures.ts), so the SPA's own assets load untouched.
id: users-by-id
method: GET
path: /api/users/{id}
presets:
  default: {}
variants:
  ada:
    status: 200
    body:
      id: 42
      name: Ada
  boom:
    status: 500
    body:
      error: upstream exploded
