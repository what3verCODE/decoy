# POST /admin/try — the playground dry-run. Fixed response (no `{{ }}` templating
# yet): the resolution + response the e2e asserts after firing the playground. The
# real engine match is covered by the server's HTTP-seam admin tests.
id: admin-try
method: POST
path: /admin/try
presets:
  default: {}
variants:
  resolved:
    status: 200
    body:
      resolution: users-by-id:default:success
      response:
        status: 200
        headers: { content-type: application/json }
        body: { id: 42, name: Ada }
