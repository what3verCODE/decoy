# GET /__decoy__/services — the booted instances the switcher lists (the service axis).
# `list` is the multi-instance baseline (users + orders); `solo` drives
# the single-instance case (switch with router.useRoute('admin-services','default','solo')).
id: admin-services
method: GET
path: /__decoy__/services
presets:
  default: {}
variants:
  list:
    status: 200
    body:
      - name: users
      - name: orders
  solo:
    status: 200
    body:
      - name: users
